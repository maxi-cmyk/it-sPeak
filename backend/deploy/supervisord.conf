[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:api]
command=python -m uvicorn itspeak.api:app --host 0.0.0.0 --port %(ENV_PORT)s
directory=/app
user=itspeak
priority=10
autostart=true
autorestart=unexpected
startsecs=5
stopsignal=TERM
stopasgroup=true
killasgroup=true
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:worker]
command=python -m celery -A itspeak.celery_app.celery_app worker --loglevel=INFO --concurrency=%(ENV_CELERY_WORKER_CONCURRENCY)s
directory=/app
user=itspeak
priority=20
autostart=true
autorestart=unexpected
startsecs=5
stopsignal=TERM
stopwaitsecs=120
stopasgroup=true
killasgroup=true
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:beat]
command=python -m celery -A itspeak.celery_app.celery_app beat --loglevel=INFO --schedule=%(ENV_ITSPEAK_ARTIFACT_DIR)s/celerybeat-schedule
directory=/app
user=itspeak
priority=30
autostart=true
autorestart=unexpected
startsecs=5
stopsignal=TERM
stopasgroup=true
killasgroup=true
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
